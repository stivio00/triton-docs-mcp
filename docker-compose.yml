services:
  triton-docs-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${TRITON_DOCS_MCP_PORT:-8080}:8080"
    environment:
      - TRITON_DOCS_MCP_PORT=8080
      - TRITON_DOCS_MCP_HOST=0.0.0.0
    volumes:
      - triton-docs-index:/root/.triton_docs_mcp_index
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8080/mcp', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  triton-docs-index: